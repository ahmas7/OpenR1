apiVersion: apps/v1
kind: Deployment
metadata:
  name: r1-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r1-api
  template:
    metadata:
      labels:
        app: r1-api
    spec:
      containers:
        - name: r1-api
          image: r1-api:local
          ports:
            - containerPort: 8000
          env:
            - name: R1_STACK_ALLOW_RUN
              value: "true"
            - name: R1_RUST_INFER_URL
              value: "http://r1-rust-infer:7071"
---
apiVersion: v1
kind: Service
metadata:
  name: r1-api
spec:
  selector:
    app: r1-api
  ports:
    - port: 8000
      targetPort: 8000
