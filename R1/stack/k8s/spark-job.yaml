apiVersion: v1
kind: ConfigMap
metadata:
  name: r1-spark-job
data:
  spark_job.py: |
    import json
    from pathlib import Path
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    spark = SparkSession.builder.appName("r1-data-processing").getOrCreate()
    df = spark.range(0, 5000).withColumn("x1", F.rand()).withColumn("x2", F.rand())
    df = df.withColumn("y", (F.col("x1") * 2.5) + (F.col("x2") * -1.2) + F.lit(0.4))
    out_dir = Path("/data/processed")
    out_dir.mkdir(parents=True, exist_ok=True)
    parquet_path = str(out_dir / "dataset.parquet")
    df.write.mode("overwrite").parquet(parquet_path)
    meta = {"rows": df.count(), "columns": df.columns, "parquet": parquet_path}
    (out_dir / "metadata.json").write_text(json.dumps(meta, indent=2))
    spark.stop()
    print(json.dumps(meta))
---
apiVersion: batch/v1
kind: Job
metadata:
  name: r1-spark-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: spark
          image: bitnami/spark:3.5
          command: ["spark-submit", "/opt/spark-apps/spark_job.py"]
          volumeMounts:
            - name: job
              mountPath: /opt/spark-apps
            - name: data
              mountPath: /data
      volumes:
        - name: job
          configMap:
            name: r1-spark-job
        - name: data
          emptyDir: {}
