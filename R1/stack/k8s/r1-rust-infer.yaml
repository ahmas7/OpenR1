apiVersion: v1
kind: ConfigMap
metadata:
  name: r1-model
data:
  model.json: |
    {"weights":[2.5,-1.2],"bias":0.4}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r1-rust-infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r1-rust-infer
  template:
    metadata:
      labels:
        app: r1-rust-infer
    spec:
      containers:
        - name: r1-rust-infer
          image: r1-rust-infer:local
          ports:
            - containerPort: 7071
          env:
            - name: MODEL_PATH
              value: /models/model.json
          volumeMounts:
            - name: model
              mountPath: /models
      volumes:
        - name: model
          configMap:
            name: r1-model
---
apiVersion: v1
kind: Service
metadata:
  name: r1-rust-infer
spec:
  selector:
    app: r1-rust-infer
  ports:
    - port: 7071
      targetPort: 7071
