<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R1 R1 | HUD INTERFACE</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --hud-cyan: #00f2ff;
      --hud-blue: #0066ff;
      --hud-gold: #ffcc00;
      --hud-red: #ff3300;
      --bg-dark: #020617;
      --panel-bg: rgba(15, 23, 42, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--hud-cyan);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      height: 100vh;
      perspective: 1000px;
    }

    /* Holographic Background */
    #holo-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.15) 0%, transparent 70%),
        linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px) 0 0 / 50px 50px,
        linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px) 0 0 / 50px 50px;
      animation: grid-scroll 20s linear infinite;
    }

    @keyframes grid-scroll {
      from { background-position: 0 0; }
      to { background-position: 50px 50px; }
    }

    /* HUD Scanlines */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.2),
        rgba(0, 0, 0, 0.2) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Glowing Text */
    .glow {
      text-shadow: 0 0 10px var(--hud-cyan), 0 0 20px rgba(0, 242, 255, 0.5);
    }

    /* HUD Panels */
    .panel {
      background: var(--panel-bg);
      border: 1px solid rgba(0, 242, 255, 0.3);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 10px;
      height: 10px;
      border-top: 2px solid var(--hud-cyan);
      border-left: 2px solid var(--hud-cyan);
    }

    .panel::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-bottom: 2px solid var(--hud-cyan);
      border-right: 2px solid var(--hud-cyan);
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .float { animation: float 6s ease-in-out infinite; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--hud-cyan);
      border-radius: 2px;
    }

    .rotating-border {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 2px solid transparent;
        border-top-color: var(--hud-cyan);
        border-radius: 50%;
        animation: spin 4s linear infinite;
        opacity: 0.3;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .stat-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid rgba(0, 242, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .arc {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 4px solid transparent;
        border-top-color: var(--hud-cyan);
        border-radius: 50%;
        transform: rotate(-45deg);
    }

    .jetbrains { font-family: 'JetBrains Mono', monospace; }
    .syncopate { font-family: 'Syncopate', sans-serif; }
  </style>
</head>
<body>
  <div id="holo-bg"></div>
  <div class="scanlines"></div>
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    function HUDPanel({ title, children, className = "" }) {
      return (
        <div className={`panel p-4 ${className}`}>
          <div className="flex justify-between items-center mb-4 border-b border-cyan-900/50 pb-2">
            <h3 className="syncopate text-[10px] font-bold tracking-widest uppercase opacity-70">{title}</h3>
            <div className="flex gap-1">
              <div className="w-1 h-1 bg-cyan-400"></div>
              <div className="w-1 h-1 bg-cyan-400 opacity-50"></div>
              <div className="w-1 h-1 bg-cyan-400 opacity-20"></div>
            </div>
          </div>
          {children}
        </div>
      );
    }

    function CircularStat({ label, value, percent, color = "var(--hud-cyan)" }) {
        return (
            <div className="flex flex-col items-center gap-2">
                <div className="stat-circle">
                    <div className="arc" style={{ borderTopColor: color, transform: `rotate(${percent * 3.6 - 45}deg)` }}></div>
                    <div className="rotating-border"></div>
                    <span className="jetbrains text-xs font-bold" style={{ color }}>{value}</span>
                </div>
                <span className="text-[9px] uppercase tracking-tighter opacity-60">{label}</span>
            </div>
        );
    }

    function ChatInterface({ messages, onSend, loading }) {
      const [input, setInput] = useState('');
      const scrollRef = useRef();

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages]);

      return (
        <div className="flex flex-col h-full">
          <div ref={scrollRef} className="flex-1 overflow-y-auto space-y-4 pr-2 mb-4">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] p-3 text-sm ${
                  m.role === 'user'
                  ? 'bg-cyan-500/10 border-r-2 border-cyan-400'
                  : 'bg-blue-500/5 border-l-2 border-blue-400'
                }`}>
                  <div className="text-[10px] uppercase opacity-40 mb-1 jetbrains">
                    {m.role === 'user' ? 'Authorized User' : 'R1 Core'}
                  </div>
                  <div className={m.role === 'user' ? 'text-cyan-100' : 'text-blue-100'}>
                    {m.text}
                  </div>
                </div>
              </div>
            ))}
            {loading && <div className="text-xs animate-pulse jetbrains">SYNCING NEURAL PATHWAYS...</div>}
          </div>
          <form onSubmit={(e) => { e.preventDefault(); onSend(input); setInput(''); }} className="relative">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              className="w-full bg-cyan-950/20 border border-cyan-900 p-4 jetbrains text-sm focus:outline-none focus:border-cyan-400 transition-colors"
              placeholder="AWAITING COMMAND..."
            />
            <div className="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
                <div className="w-2 h-2 bg-cyan-400 animate-ping"></div>
            </div>
          </form>
        </div>
      );
    }

    function App() {
      const [health, setHealth] = useState(null);
      const [messages, setMessages] = useState([{ role: 'assistant', text: 'Good evening, Operator. Systems are at 100% capacity. How may I assist you today?' }]);
      const [loading, setLoading] = useState(false);
      const [time, setTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const refreshData = useCallback(async () => {
        try {
          const h = await fetch('/health').then(r => r.json());
          setHealth(h);
        } catch (e) {}
      }, []);

      useEffect(() => {
        refreshData();
        const i = setInterval(refreshData, 5000);
        return () => clearInterval(i);
      }, [refreshData]);

      const handleSend = async (text) => {
        if (!text.trim()) return;
        setMessages(prev => [...prev, { role: 'user', text }]);
        setLoading(true);
        try {
          const r = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          const d = await r.json();
          setMessages(prev => [...prev, { role: 'assistant', text: d.response }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: 'assistant', text: 'Neural link interrupted. Please retry.' }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="p-6 h-full flex flex-col gap-6">
          {/* Header */}
          <div className="flex justify-between items-start">
            <div className="flex flex-col">
              <h1 className="syncopate text-2xl font-bold tracking-tighter glow">R1 <span className="opacity-50">R1</span></h1>
              <div className="flex items-center gap-2 text-[10px] jetbrains opacity-60">
                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                CORE ENGINES ACTIVE // {health?.provider || 'LOCAL_GGUF'}
              </div>
            </div>
            <div className="text-right">
              <div className="syncopate text-xl font-bold">{time.toLocaleTimeString([], { hour12: false })}</div>
              <div className="jetbrains text-[10px] opacity-50 uppercase">{time.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
            </div>
          </div>

          {/* Main Layout */}
          <div className="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
            {/* Left Column - Stats */}
            <div className="col-span-3 flex flex-col gap-6">
              <HUDPanel title="System Biometrics" className="flex-1">
                <div className="grid grid-cols-2 gap-y-8 mt-4">
                  <CircularStat label="Neural Load" value={health?.model_health?.cpu_percent ? `${health.model_health.cpu_percent}%` : "24%"} percent={health?.model_health?.cpu_percent || 24} />
                  <CircularStat label="Synapse Latency" value="12ms" percent={12} color="var(--hud-gold)" />
                  <CircularStat label="Memory Buffer" value={health?.model_health?.memory_used_gb ? `${health.model_health.memory_used_gb}GB` : "8.4GB"} percent={health?.model_health?.memory_percent || 65} />
                  <CircularStat label="Thread Heat" value="42°C" percent={42} color="var(--hud-red)" />
                </div>
                <div className="mt-8 space-y-2">
                    <div className="text-[10px] uppercase opacity-40 jetbrains flex justify-between">
                        <span>Database Integrity</span>
                        <span>99.9%</span>
                    </div>
                    <div className="h-1 bg-cyan-950">
                        <div className="h-full bg-cyan-400 w-[99.9%]"></div>
                    </div>
                </div>
              </HUDPanel>

              <HUDPanel title="Global Network" className="h-48">
                <div className="flex items-center justify-center h-full">
                    <div className="relative w-24 h-24">
                        <div className="absolute inset-0 border border-cyan-500/20 rounded-full animate-ping"></div>
                        <div className="absolute inset-4 border border-blue-500/20 rounded-full animate-pulse"></div>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="w-1 h-1 bg-cyan-400 rounded-full glow"></div>
                        </div>
                    </div>
                </div>
              </HUDPanel>
            </div>

            {/* Middle Column - Console */}
            <div className="col-span-6 flex flex-col">
                <HUDPanel title="Neural Interface Command" className="flex-1">
                    <ChatInterface messages={messages} onSend={handleSend} loading={loading} />
                </HUDPanel>
            </div>

            {/* Right Column - Subsystems */}
            <div className="col-span-3 flex flex-col gap-6">
                <HUDPanel title="Active Subsystems" className="flex-1 overflow-y-auto">
                    <div className="space-y-4 mt-2">
                        {[
                            { name: 'Global_Intelligence', status: 'Active', color: 'text-cyan-400' },
                            { name: 'Self_Improver', status: 'Learning', color: 'text-purple-400' },
                            { name: 'Recursive_Writer', status: 'Standby', color: 'text-blue-400' },
                            { name: 'Vision_Core', status: 'Active', color: 'text-green-400' },
                            { name: 'Semantic_Graph', status: 'Indexing', color: 'text-yellow-400' },
                            { name: 'Proactive_Loop', status: 'Monitoring', color: 'text-green-400' },
                            { name: 'Tool_Orchestrator', status: 'Standby', color: 'text-blue-400' },
                            { name: 'Voice_Synthesizer', status: 'Ready', color: 'text-green-400' }
                        ].map(s => (
                            <div key={s.name} className="flex justify-between items-center border-l-2 border-cyan-900 pl-3 py-1">
                                <span className="jetbrains text-xs font-bold">{s.name}</span>
                                <span className={`text-[10px] uppercase font-bold ${s.color}`}>{s.status}</span>
                            </div>
                        ))}
                    </div>
                </HUDPanel>

                <HUDPanel title="Diagnostic Logs" className="h-64 overflow-hidden">
                    <div className="jetbrains text-[9px] space-y-1 opacity-60">
                        <div className="text-cyan-400">[0.0012] Handshake established with {health?.provider || 'Provider'}</div>
                        <div className="text-blue-400">[0.0045] Memory buffer cleared</div>
                        <div className="text-cyan-400">[0.0089] Proactive agents synchronized</div>
                        <div className="text-yellow-400">[0.0156] Latency spike detected in LLM node</div>
                        <div className="text-cyan-400">[0.0210] Secure tunnel encrypted (AES-256)</div>
                        <div className="text-green-400">[0.0344] Heartbeat verified</div>
                    </div>
                </HUDPanel>
            </div>
          </div>

          {/* Footer Navigation */}
          <div className="flex justify-center gap-8 border-t border-cyan-900/30 pt-4">
            {['Dashboard', 'Skills', 'Memory', 'Settings', 'Archive'].map(tab => (
              <button key={tab} className="syncopate text-[10px] tracking-widest uppercase hover:text-white transition-colors">
                {tab}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
